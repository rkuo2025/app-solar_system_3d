<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Sci-Fi 3D Solar System</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            pointer-events: none;
            text-shadow: 0 0 10px #00f2ff;
            border-left: 3px solid #00f2ff;
            padding-left: 15px;
            background: rgba(0, 20, 40, 0.6);
            padding: 20px;
            border-radius: 0 10px 10px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #info h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        #info p { margin: 5px 0 0; font-size: 16px; color: # ICE-BLUE; }
        .instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(0, 242, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body style="background: #000;">
    <div id="info">
        <h1 id="planet-name">Planet</h1>
        <p id="planet-period">Period: -</p>
    </div>
    <div class="instructions">Drag to Rotate • Scroll to Zoom • Hover for Data</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const PLANET_DATA = [
            { name: "水星 (Mercury)", color: 0x999999, distance: 15, size: 0.8, period: 0.24, speed: 0.047 },
            { name: "金星 (Venus)", color: 0xe3bb76, distance: 22, size: 1.2, period: 0.62, speed: 0.035 },
            { name: "地球 (Earth)", color: 0x2271b3, distance: 30, size: 1.3, period: 1.00, speed: 0.029 },
            { name: "火星 (Mars)", color: 0xe27b58, distance: 38, size: 1.0, period: 1.88, speed: 0.024 },
            { name: "木星 (Jupiter)", color: 0xd39c7e, distance: 55, size: 3.5, period: 11.86, speed: 0.013 },
            { name: "土星 (Saturn)", color: 0xc5ab6e, distance: 75, size: 3.0, period: 29.46, speed: 0.009, ring: true },
            { name: "天王星 (Uranus)", color: 0xb5e3e3, distance: 95, size: 2.2, period: 84.01, speed: 0.006 },
            { name: "海王星 (Neptune)", color: 0x6081ff, distance: 110, size: 2.1, period: 164.79, speed: 0.005 },
        ];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 60, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const sunLight = new THREE.PointLight(0xffffff, 3, 500, 0);
        scene.add(sunLight);
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
        const starVertices = [];
        for (let i = 0; i < 10000; i++) {
            starVertices.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
        }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        const sunGeo = new THREE.SphereGeometry(6, 32, 32);
        const sunMat = new THREE.MeshStandardMaterial({ 
            emissive: 0xffcc00, 
            emissiveIntensity: 2, 
            color: 0xffaa00 
        });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            grad.addColorStop(0.5, 'rgba(255,200,0,0.2)');
            grad.addColorStop(1, 'rgba(255,200,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const spriteMat = new THREE.SpriteMaterial({ 
            map: createGlowTexture(), 
            color: 0xffaa00, 
            transparent: true, 
            blending: THREE.AdditiveBlending 
        });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(25, 25, 1);
        sun.add(sprite);

        const planets = [];
        PLANET_DATA.forEach(data => {
            const group = new THREE.Group();
            scene.add(group);

            const orbitGeo = new THREE.RingGeometry(data.distance - 0.1, data.distance + 0.1, 128);
            const orbitMat = new THREE.MeshBasicMaterial({ color: 0x4444ff, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
            const orbitPath = new THREE.Mesh(orbitGeo, orbitMat);
            orbitPath.rotation.x = Math.PI / 2;
            scene.add(orbitPath);

            const planetGeo = new THREE.SphereGeometry(data.size, 32, 32);
            const planetMat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.7 });
            const planet = new THREE.Mesh(planetGeo, planetMat);
            planet.position.x = data.distance;
            planet.userData = { name: data.name, period: data.period };
            group.add(planet);

            if (data.ring) {
                const ringGeo = new THREE.RingGeometry(data.size + 1, data.size + 3, 64);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                planet.add(ring);
            }

            planets.push({ mesh: planet, group: group, speed: data.speed });
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const infoPanel = document.getElementById('info');
        const nameEl = document.getElementById('planet-name');
        const periodEl = document.getElementById('planet-period');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            planets.forEach(p => {
                p.group.rotation.y += p.speed * 0.5;
                p.mesh.rotation.y += 0.01;
            });
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                nameEl.innerText = obj.userData.name;
                periodEl.innerText = `軌道週期: ${obj.userData.period} 地球年`;
                infoPanel.style.opacity = 1;
            } else {
                infoPanel.style.opacity = 0;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
